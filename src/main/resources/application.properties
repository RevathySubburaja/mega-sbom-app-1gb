spring.application.name=mega-sbom-app-1gb
server.port=${PORT:8080}

# H2 in-memory database for JPA
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop

# Disable Liquibase and Flyway (we don't need migrations for this test app)
spring.liquibase.enabled=false
spring.flyway.enabled=false

# Disable Spring Cloud Config (not needed for this test app)
spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false

# Disable Spring Cloud Gateway (incompatible with Spring MVC)
spring.cloud.gateway.enabled=false

# Disable Eureka client (not needed for this test app)
eureka.client.enabled=false

# Actuator endpoints for git info and health
management.endpoints.web.exposure.include=info,health
management.info.git.enabled=true
management.info.git.mode=full
