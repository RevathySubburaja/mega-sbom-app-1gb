spring.application.name=mega-sbom-app-1gb
server.port=${PORT:8080}

# H2 in-memory database for JPA
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop

# Disable Liquibase and Flyway (we don't need migrations for this test app)
spring.liquibase.enabled=false
spring.flyway.enabled=false

# Disable Spring Cloud Config (not needed for this test app)
spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false

# Disable Spring Cloud Gateway (incompatible with Spring MVC)
spring.cloud.gateway.enabled=false

# Disable Eureka client (not needed for this test app)
eureka.client.enabled=false

# Disable Cassandra auto-configuration (no Cassandra server available)
spring.cassandra.local-datacenter=datacenter1
spring.data.cassandra.contact-points=
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.cassandra.CassandraAutoConfiguration,org.springframework.boot.autoconfigure.data.cassandra.CassandraDataAutoConfiguration,org.springframework.boot.autoconfigure.data.cassandra.CassandraReactiveDataAutoConfiguration,org.springframework.boot.autoconfigure.data.cassandra.CassandraRepositoriesAutoConfiguration,org.springframework.boot.autoconfigure.data.cassandra.CassandraReactiveRepositoriesAutoConfiguration,org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration,org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration,org.springframework.boot.autoconfigure.data.mongo.MongoRepositoriesAutoConfiguration,org.springframework.boot.autoconfigure.data.mongo.MongoReactiveDataAutoConfiguration,org.springframework.boot.autoconfigure.data.mongo.MongoReactiveRepositoriesAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration,org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchDataAutoConfiguration,org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchRestClientAutoConfiguration,org.springframework.boot.autoconfigure.data.neo4j.Neo4jDataAutoConfiguration,org.springframework.boot.autoconfigure.neo4j.Neo4jAutoConfiguration,org.springframework.boot.autoconfigure.data.neo4j.Neo4jRepositoriesAutoConfiguration,org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration,org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration,org.springframework.boot.autoconfigure.pulsar.PulsarAutoConfiguration,org.springframework.boot.autoconfigure.pulsar.PulsarReactiveAutoConfiguration,org.springframework.boot.autoconfigure.hazelcast.HazelcastAutoConfiguration,org.springframework.boot.autoconfigure.influx.InfluxDbAutoConfiguration

# Actuator endpoints for git info and health
management.endpoints.web.exposure.include=info,health
management.info.git.enabled=true
management.info.git.mode=full
